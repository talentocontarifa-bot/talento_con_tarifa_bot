name: Test API and Gemini Models

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Nvidia Test Script
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: node test_nvidia.js

      - name: Upload Test Images
        uses: actions/upload-artifact@v4
        with:
          name: test-images
          path: |
            output_768_1344.png
            output_1024_1024.png
