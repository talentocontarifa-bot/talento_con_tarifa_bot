name: Publicador de Talento con Tarifa

on:
  schedule:
    # 13:00 UTC equivale a las 8:00 AM (Centro de México/Colombia)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite ejecutar el botón desde la interfaz de GitHub
  repository_dispatch: # Permite que cron-job.org dispare el bot vía Webhook
    types: [trigger-publicador]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Permisos vitales para leer la bandeja de entrada y cerrar el issue
    permissions:
      contents: read
      issues: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update apt package database
        run: sudo apt-get update

      - name: Install Scrapling
        run: |
          pip install "scrapling[fetchers]"
          scrapling install

      - name: Ejecutar el Master Pipeline de Contenido (Issues + RSS)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Necesario para que gh cli pueda cerrar los issues
        run: node master_pipeline.js
