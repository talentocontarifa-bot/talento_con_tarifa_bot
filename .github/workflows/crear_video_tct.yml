name: Crear Video TCT

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'  # 10am Ciudad de México (UTC-5)

jobs:
  render-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          cd video_tct
          npm install

      - name: Generate Daily News (Gemini + ElevenLabs + HF)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          cd video_tct
          node create_daily_news.js

      - name: Render Video
        run: |
          cd video_tct
          npx remotion render src/index.ts LatamAINews out/video_final_tct.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-tct-${{ github.run_number }}
          path: video_tct/out/video_final_tct.mp4
          retention-days: 1
